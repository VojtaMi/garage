<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0f0c"/>
      <stop offset="100%" stop-color="#111817"/>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dff9b"/>
      <stop offset="45%" stop-color="#2be870"/>
      <stop offset="100%" stop-color="#0f9f4f"/>
    </linearGradient>

    <linearGradient id="maskGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#131313"/>
    </linearGradient>

    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="400" height="400" rx="24" fill="url(#bgGrad)"/>
  <ellipse cx="200" cy="205" rx="120" ry="135" fill="#1db954" opacity="0.08" filter="url(#greenGlow)"/>

  <path d="M130 130 L92 36 L172 84 Z" fill="url(#maskGrad)" filter="url(#softShadow)"/>
  <path d="M270 130 L308 36 L228 84 Z" fill="url(#maskGrad)" filter="url(#softShadow)"/>

  <path d="M129 108 L105 52 L155 82 Z" fill="none" stroke="url(#greenGrad)" stroke-width="5" stroke-linejoin="round" filter="url(#greenGlow)"/>
  <path d="M271 108 L295 52 L245 82 Z" fill="none" stroke="url(#greenGrad)" stroke-width="5" stroke-linejoin="round" filter="url(#greenGlow)"/>

  <path d="M92 162
           C92 82, 308 82, 308 162
           C308 230, 332 314, 324 368
           L76 368
           C68 314, 92 230, 92 162 Z"
        fill="url(#maskGrad)"
        filter="url(#softShadow)"/>

  <path d="M92 162
           C92 82, 308 82, 308 162
           C308 230, 332 314, 324 368
           L76 368
           C68 314, 92 230, 92 162 Z"
        fill="none"
        stroke="url(#greenGrad)"
        stroke-width="4"
        filter="url(#greenGlow)"/>

  <path d="M92 238 C117 247, 133 300, 124 368" fill="none" stroke="url(#greenGrad)" stroke-width="7" stroke-linecap="round" filter="url(#greenGlow)"/>
  <path d="M308 238 C283 247, 267 300, 276 368" fill="none" stroke="url(#greenGrad)" stroke-width="7" stroke-linecap="round" filter="url(#greenGlow)"/>

  <path d="M177 178 L223 178 L246 326
           Q200 352 154 326 Z"
        fill="#1a1a1a"
        stroke="url(#greenGrad)"
        stroke-width="4"
        filter="url(#greenGlow)"/>

  <path d="M103 187 Q140 151 178 194 Q140 215 103 187 Z" fill="#050505"/>
  <path d="M297 187 Q260 151 222 194 Q260 215 297 187 Z" fill="#050505"/>

  <path d="M108 160 Q146 137 182 180" stroke="url(#greenGrad)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#greenGlow)"/>
  <path d="M292 160 Q254 137 218 180" stroke="url(#greenGrad)" stroke-width="7" stroke-linecap="round" fill="none" filter="url(#greenGlow)"/>

  <ellipse cx="200" cy="296" rx="38" ry="25" fill="#090909" stroke="#2e2e2e" stroke-width="2"/>
  <ellipse cx="200" cy="282" rx="16" ry="7" fill="#3f3f3f" opacity="0.9"/>

  <circle cx="166" cy="252" r="4" fill="url(#greenGrad)"/>
  <circle cx="154" cy="282" r="4" fill="url(#greenGrad)"/>
  <circle cx="164" cy="311" r="4" fill="url(#greenGrad)"/>

  <circle cx="234" cy="252" r="4" fill="url(#greenGrad)"/>
  <circle cx="246" cy="282" r="4" fill="url(#greenGrad)"/>
  <circle cx="236" cy="311" r="4" fill="url(#greenGrad)"/>

  <path d="M188 112 Q200 124 212 112" fill="none" stroke="#2be870" stroke-width="3" opacity="0.75"/>

  <path d="M120 150 Q145 110 190 110" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="5" stroke-linecap="round"/>
  <path d="M280 150 Q255 110 210 110" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="4" stroke-linecap="round"/>
</svg>
